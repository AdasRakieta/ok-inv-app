name: Build and publish APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Android SDK
        uses: r0adkll/setup-android@v2
        with:
          api-levels: 33
          build-tools: 33.0.2

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare keystore (optional)
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            mkdir -p app
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
            echo "storeFile=keystore.jks" > app/keystore.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> app/keystore.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> app/keystore.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> app/keystore.properties
          else
            echo "No KEYSTORE_BASE64 secret set; skipping keystore creation"
          fi

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: List built APKs
        run: ls -la app/build/outputs/apk || true

      - name: Upload APK as artifact (Actions)
        uses: actions/upload-artifact@v3
        with:
          name: app-apk
          path: app/build/outputs/apk/**/**/*.apk

      - name: Publish Release and attach APK(s)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-${{ github.sha }}
          name: Release ${{ github.sha }}
          files: app/build/outputs/apk/**/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
