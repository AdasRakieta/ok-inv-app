name: Build and publish APK

on:
  push:
    branches: [ main, Redesign-test ]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner debug info
        run: |
          echo "=== System info ==="
          uname -a || hostname
          echo "=== Java info ==="
          java -version || true
          javac -version || true
          echo "JAVA_HOME=$JAVA_HOME"
          echo "=== Android SDK info ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          if command -v sdkmanager >/dev/null 2>&1; then
            echo "sdkmanager found: $(command -v sdkmanager)"
            sdkmanager --list || true
          else
            echo "sdkmanager not found on runner"
          fi

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Check / prepare Android SDK (best-effort)
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          if command -v sdkmanager >/dev/null 2>&1; then
            echo "sdkmanager found: $(command -v sdkmanager)"
            yes | sdkmanager --licenses || true
            sdkmanager "platforms;android-33" "build-tools;33.0.2" || true
          else
            echo "sdkmanager not found on runner — relying on preinstalled SDK"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare keystore (optional)
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            mkdir -p app
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
            echo "storeFile=keystore.jks" > app/keystore.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> app/keystore.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> app/keystore.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> app/keystore.properties
          else
            echo "No KEYSTORE_BASE64 secret set; skipping keystore creation"
          fi

      - name: Build release APK
        run: |
          set -o pipefail
          ./gradlew :app:assembleRelease --no-daemon --stacktrace | tee build.log

      - name: Get versionName
        id: get_version
        run: |
          # extract versionName from app/build.gradle.kts (fallback to timestamp if not found)
          set -e
          if [ -f app/build.gradle.kts ]; then
            VERSION_NAME=$(sed -n 's/.*versionName *= *"\(.*\)".*/\1/p' app/build.gradle.kts | head -n1 || true
          fi
          if [ -z "${VERSION_NAME}" ]; then
            VERSION_NAME="${GITHUB_RUN_ID}-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Prepare versioned APK for release
        run: |
          set -e
          mkdir -p release-apks
          # Prefer the release APK location; otherwise try common fallback paths
          cp app/build/outputs/apk/release/*.apk release-apks/ok-inv-app-v${{ steps.get_version.outputs.version }}.apk 2>/dev/null || \
            cp app/build/outputs/apk/*/*/*.apk release-apks/ok-inv-app-v${{ steps.get_version.outputs.version }}.apk 2>/dev/null || true
          ls -la release-apks || true

      - name: List built APKs
        run: |
          echo '--- raw apk outputs ---'
          ls -la app/build/outputs/apk || true
          echo '--- release-apks (versioned) ---'
          ls -la release-apks || true

      - name: Upload build log (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK as artifact (Actions)
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: release-apks/**

      - name: Publish Release and attach APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          files: release-apks/ok-inv-app-v${{ steps.get_version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
